<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Order Confirmation</title>
  </head>
  <body style="margin:0; padding:0;">
    <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="font-family: Arial, sans-serif; background:#f8f8f8;">
      <tr>
        <td align="center">
          <table role="presentation" cellpadding="0" cellspacing="0" width="600" style="background:#ffffff; margin:20px;">
            <tr>
              <td style="padding:20px; text-align:center;">
                <h1 style="margin:0;">Hello {{first_name}},</h1>
                <p style="margin:0;">Thank you for your order {{order_number}}!</p>
              </td>
            </tr>
            <tr>
              <td style="padding:20px;">
                <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
                  {{#each items}}
                  <tr>
                    <td width="80" style="padding:10px;">
                      <img src="{{image_url}}" alt="{{name}}" width="80" height="80" style="display:block;">
                    </td>
                    <td style="padding:10px;">
                      <p style="margin:0; font-weight:bold;">{{name}}</p>
                      <p style="margin:0;">{{price}}</p>
                    </td>
                  </tr>
                  {{/each}}
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding:20px; text-align:right; border-top:1px solid #e0e0e0;">
                <p style="margin:0; font-weight:bold;">Total: {{total}}</p>
              </td>
            </tr>
            <tr>
              <td style="padding:20px;">
                <p style="font-size:12px; color:#888888;">If you have any questions, please contact our support team.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
